<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles/dashboard.css" />
    <link rel="stylesheet" href="styles/analytics.css" />
    <style>
        body {
            min-height: 100vh;
            height: 100vh;
            margin: 0;
            padding: clamp(10px, 2vw, 20px);
            overflow: hidden;
        }
        .tasks-container {
            width: 100%;
            height: 100vh;
            max-height: calc(100vh - clamp(30px, 8vw, 40px));
            max-width: 1800px;
            margin: 0;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .tasks-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .tasks-content {
            padding: clamp(14px, 2.2vw, 22px);
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
            height: 100%;
        }
        .tasks-page {
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .tasks-top-card { border: 1px solid var(--card-border); border-radius: 16px; overflow: hidden; background: var(--card-bg); box-shadow: 0 8px 28px rgba(0,0,0,0.16); }
        .tasks-top-accent { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; gap: 12px; }
        .tasks-top-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.16);
            color: #f7ffff;
        }
        .tasks-top-icon svg { width: 20px; height: 20px; }
        .tasks-top-title { font-size: clamp(2.1rem, 4vw, 3rem); font-weight: 600; color: #f7ffff; letter-spacing: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.05; }
        .tasks-top-subtitle { color: rgba(245,255,255,0.85); font-size: 12px; margin-top: 2px; }
        .tasks-top-controls { padding: 10px 14px; display: grid; grid-template-columns: minmax(220px, 1fr) auto auto auto auto auto auto auto; gap: 8px; }

        .tasks-input, .tasks-select, .tasks-button {
            min-height: 38px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
        }
        .tasks-input, .tasks-select { padding: 8px 10px; }
        .tasks-input:focus, .tasks-select:focus {
            outline: none;
            border-color: rgba(42,184,173,0.75);
            box-shadow: 0 0 0 3px rgba(42,184,173,0.16);
        }
        .tasks-button { padding: 8px 12px; cursor: pointer; font-weight: 700; }
        .tasks-button:hover { background: rgba(255,255,255,0.08); }
        .tasks-button.primary { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; border: 0; }

        .tasks-filter-panel {
            margin: 0 14px 12px;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            display: none;
            padding: 10px;
            grid-template-columns: repeat(4, minmax(120px,1fr)) auto;
            gap: 8px;
        }
        .tasks-filter-panel.open { display: grid; }

        .tasks-shell {
            --left-pane-width: 360px;
            flex: 1;
            min-height: 0;
            display: grid;
            gap: 0;
            grid-template-columns: minmax(220px, var(--left-pane-width)) 8px minmax(520px, 1fr);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            background: var(--card-bg);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        .tasks-shell.left-collapsed {
            grid-template-columns: 0 0 minmax(520px, 1fr);
        }
        .tasks-splitter {
            cursor: col-resize;
            background: rgba(255,255,255,0.06);
            border-left: 1px solid rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .tasks-splitter::after {
            content: '↔';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: rgba(210, 220, 230, 0.72);
            font-size: 12px;
            line-height: 1;
            pointer-events: none;
        }
        body:not(.dark-mode) .tasks-splitter {
            background: rgba(78, 92, 106, 0.16);
            border-left-color: rgba(78, 92, 106, 0.38);
            border-right-color: rgba(78, 92, 106, 0.38);
        }
        body:not(.dark-mode) .tasks-splitter::after {
            color: rgba(56, 70, 84, 0.78);
        }
        .tasks-shell.left-collapsed .tasks-splitter { display:none; }
        .tasks-card {
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        .tasks-card + .tasks-card { border-left: 0; }
        .tasks-card-title { padding: 10px 12px; font-size: 12px; font-weight: 800; letter-spacing: 0.08em; color: var(--text-secondary); border-bottom: 1px solid var(--card-border); }

        .tasks-list-header {
            padding: 8px 10px;
            margin-top: 10px;
            border-bottom: 1px solid rgba(160,160,160,0.2);
            font-size: 11px;
            letter-spacing: 0.04em;
            text-transform: none;
            color: var(--text-secondary);
            display: grid;
            grid-template-columns: 24px 1fr 54px;
            gap: 8px;
            align-items: center;
            background: rgba(255,255,255,0.03);
        }
        .tasks-sort-btn {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 0;
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            line-height: 1;
            margin-left: 6px;
        }
        .tasks-sort-btn:hover { background: rgba(255,255,255,0.12); }
        .tasks-sort-mode {
            opacity: 0.8;
            font-size: 10px;
            letter-spacing: 0;
            margin-left: 4px;
        }
        .tasks-list-col { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tasks-list-col.assignee { text-align: center; }
        .tasks-list-gap {
            height: 6px;
        }
        .tasks-list-body { min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 0; margin-top: 0; display: flex; flex-direction: column; gap: 0; }

        .tasks-list-body::-webkit-scrollbar { width: 10px; }
        .tasks-list-body::-webkit-scrollbar-thumb { background: rgba(42,184,173,0.88); border-radius: 999px; }
        .tasks-list-body::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .tasks-list-body { scrollbar-color: rgba(42,184,173,0.88) rgba(255,255,255,0.05); scrollbar-width: thin; }

        .tasks-row {
            display: grid;
            grid-template-columns: 24px 1fr 54px;
            gap: 8px;
            align-items: center;
            padding: 10px 10px;
            min-height: 44px;
            border-radius: 0;
            border: 0;
            border-bottom: 1px solid rgba(160,160,160,0.14);
            cursor: pointer;
            font-size: 13px;
            background: rgba(255,255,255,0.01);
        }
        .tasks-row:hover { background: rgba(255,255,255,0.06); }
        .tree-toggle { width: 22px; height: 22px; border: 0; border-radius: 6px; background: transparent; color: var(--text-secondary); cursor: pointer; }
        .tree-toggle:hover { background: rgba(255,255,255,0.08); }
        .task-title-wrap { min-width: 0; position: relative; }
        .task-title { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 560; }
        .tasks-row.depth-0 .task-title { font-weight: 720; }
        .tasks-row.depth-1 .task-title { font-weight: 620; }
        .tasks-row.depth-2 .task-title { font-weight: 520; }
        .tasks-row.depth-3 .task-title { font-weight: 460; }
        .task-assignee-avatar { width: 28px; height: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-secondary); background: rgba(126, 154, 188, 0.16); margin: 0 auto; border: 1px solid rgba(126, 154, 188, 0.28); cursor: pointer; transition: background 120ms ease, border-color 120ms ease, color 120ms ease; }
        .task-assignee-avatar:hover { background: rgba(42,184,173,0.16); border-color: rgba(42,184,173,0.46); color: var(--text-primary); }
        .assignee-focus { border-color: rgba(42,184,173,0.9) !important; box-shadow: 0 0 0 3px rgba(42,184,173,0.2); }
        .task-color-badge { width: 10px; height: 10px; border-radius: 999px; display: inline-block; margin-right: 7px; vertical-align: middle; }
        .task-connector {
            position: absolute;
            left: -16px;
            top: 50%;
            height: 2px;
            width: 14px;
            transform: translateY(-50%);
            background: currentColor;
            opacity: 0;
        }
        .task-connector.anim { animation: taskConnectorGrow 260ms ease-out forwards; }
        @keyframes taskConnectorGrow {
            from { width: 0; opacity: 0.2; }
            to { width: 18px; opacity: 0.9; }
        }

        .gantt-wrap {
            min-height: 0;
            overflow: auto;
            scrollbar-width: none;
            border-top: 1px solid rgba(160,160,160,0.22);
            background: transparent;
            position: relative;
        }
        .gantt-wrap::-webkit-scrollbar { width: 0; height: 0; display: none; }
        .timeline-nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--scroll-arrows-border);
            background: var(--scroll-arrows-bg);
            color: var(--scroll-arrows-border);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
        }
        .timeline-nav-arrow:hover {
            background: var(--scroll-arrows-bg-hover);
            border-color: var(--scroll-arrows-border-hover);
        }
        .timeline-nav-arrow.left { left: 6px; }
        .timeline-nav-arrow.right { right: 6px; }
        .gantt-delete-zone { position: absolute; left: 50%; top: 10px; transform: translateX(-50%); width: 44px; height: 32px; border-radius: 9px; border: 1px solid rgba(255,126,113,0.6); background: rgba(255,126,113,0.18); color: #ffb0a8; z-index: 8; display: none; align-items: center; justify-content: center; font-size: 18px; pointer-events: none; }
        .gantt-delete-zone.show { display: flex; }
        .gantt-delete-zone.hot { background: rgba(255,126,113,0.42); color: #fff; border-color: rgba(255,126,113,0.96); }

        .gantt-head, .gantt-row { display: grid; width: 100%; }
        .gantt-head {
            position: sticky;
            top: 0;
            z-index: 2;
            background: rgba(23, 28, 38, 0.9);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid rgba(160,160,160,0.24);
        }
        .gantt-cell {
            font-size: 11px;
            color: #c9d0d8;
            text-align: center;
            padding: 6px 2px;
            border-right: 1px solid rgba(150,150,150,0.18);
        }
        .gantt-head .gantt-cell { background: rgba(23, 28, 38, 0.72); }
        body:not(.dark-mode) .gantt-head .gantt-cell { background: rgba(224, 232, 238, 0.88); }
        .gantt-row .gantt-cell { padding: 0; min-height: 44px; background: transparent; }
        .gantt-cell.month-marker {
            font-size: 10px;
            background: transparent;
            font-weight: 700;
            color: var(--text-secondary);
            min-height: 20px;
            border-bottom: 1px solid rgba(160,160,160,0.16);
        }
        .gantt-cell.weekend-cell,
        .gantt-row .gantt-cell.weekend-cell {
            background: rgba(15, 25, 35, 0.18);
        }
        body:not(.dark-mode) .gantt-cell.weekend-cell,
        body:not(.dark-mode) .gantt-row .gantt-cell.weekend-cell {
            background: rgba(120, 132, 145, 0.16);
        }
        body:not(.dark-mode) .gantt-head { background: rgba(230,236,239,0.9); }
        body:not(.dark-mode) .gantt-cell { color: #5c6772; }

        .gantt-cell.today-cell,
        .gantt-row .gantt-cell.today-cell {
            background: rgba(67, 214, 196, 0.22);
        }
        body:not(.dark-mode) .gantt-cell.today-cell,
        body:not(.dark-mode) .gantt-row .gantt-cell.today-cell {
            background: rgba(67, 214, 196, 0.18);
        }
        .gantt-row { position: relative; min-height: 44px; border-bottom: 1px solid rgba(160,160,160,0.14); transition: transform 140ms ease; }
        .gantt-row.drag-disabled { opacity: 0.35; }
        .gantt-row.drag-target { background: rgba(56, 200, 160, 0.12); }
        .gantt-overdue { position: absolute; top: 0; bottom: 0; background: rgba(255,126,113,0.28); border-right: 1px solid rgba(255,126,113,0.45); pointer-events: none; }
        .gantt-bar {
            position: absolute;
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 10px;
            top: 8px;
            height: 28px;
            border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.18);
            cursor: grab;
            box-shadow: 0 3px 10px rgba(17, 153, 142, 0.2);
        }
        .gantt-bar:active { cursor: grabbing; }
        .gantt-bar:hover { filter: brightness(1.03); box-shadow: 0 4px 12px rgba(17, 153, 142, 0.24); }
        .gantt-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        .gantt-menu-btn { position: absolute; right: 4px; top: 4px; width: 16px; height: 16px; border: 0; border-radius: 3px; background: rgba(0,0,0,0.18); color: rgba(255,255,255,0.92); font-size: 12px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 120ms ease; }
        .gantt-bar:hover .gantt-menu-btn, .gantt-bar:hover .gantt-child-btn { opacity: 1; }
        .gantt-child-btn { position: absolute; right: 22px; top: 4px; width: 16px; height: 16px; border: 0; border-radius: 3px; background: rgba(0,0,0,0.18); color: rgba(255,255,255,0.92); font-size: 12px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 120ms ease; }
        .gantt-progress {
            position: absolute;
            left: 0;
            bottom: 0;
            height: 2px;
            background: rgba(9, 97, 143, 0.95);
            pointer-events: none;
            z-index: 2;
        }
        .gantt-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 10px;
            opacity: 0;
            cursor: ew-resize;
            z-index: 3;
        }
        .gantt-handle.left { left: -1px; }
        .gantt-handle.right { right: -1px; }
        .gantt-bar:hover .gantt-handle { opacity: 0.16; background: rgba(255,255,255,0.65); }
        .priority-high { box-shadow: inset 0 0 0 1px rgba(255,84,84,0.72), 0 8px 20px rgba(255, 84, 84, 0.26); }
        .gantt-bar.out-of-range {
            color: rgba(230, 236, 242, 0.9);
            background: linear-gradient(90deg, rgba(147,157,169,0.82), rgba(102,112,124,0.54));
            box-shadow: inset 0 0 0 1px rgba(198,206,216,0.28);
        }
        .gantt-bar.out-of-range.left {
            background: linear-gradient(90deg, rgba(102,112,124,0.2), rgba(147,157,169,0.86));
        }
        .gantt-bar.out-of-range.right {
            background: linear-gradient(90deg, rgba(147,157,169,0.86), rgba(102,112,124,0.2));
        }

        .tasks-empty { color: var(--text-secondary); text-align: center; padding: 24px; font-size: 13px; }

        .task-modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(10,16,20,0.56); backdrop-filter: blur(2px); z-index: 80; }
        .task-modal.open { display: flex; }
        .task-modal-card {
            width: min(780px, 92vw);
            max-height: 88vh;
            overflow: auto;
            border-radius: 18px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }
        .task-modal-header {
            background: linear-gradient(135deg, #53b3c2, #86d9c8);
            color: #fff;
            padding: 16px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.16);
            font-size: 24px;
            font-weight: 800;
        }
        .task-modal-body { padding: 16px; }
        .task-form-grid { display: grid; grid-template-columns: repeat(2, minmax(180px, 1fr)); gap: 10px; }
        .task-form-grid textarea { grid-column: 1 / -1; min-height: 74px; resize: vertical; }
        .task-form-grid details { grid-column: 1 / -1; border: 1px solid var(--card-border); border-radius: 12px; padding: 10px; background: rgba(255,255,255,0.02); }
        .task-form-grid summary { cursor: pointer; font-size: 12px; color: var(--text-secondary); font-weight: 700; }
        .task-optional-grid { margin-top: 8px; display: grid; grid-template-columns: repeat(2, minmax(170px, 1fr)); gap: 8px; }
        .task-itemcode-lookup { grid-column: 1 / -1; position: relative; }
        .task-itemcode-lookup .tasks-input { width: 100%; }
        .task-itemcode-lookup .dropdown-options {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 30;
            max-height: 240px;
            overflow: auto;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: var(--card-bg);
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
            display: none;
        }
        .task-itemcode-lookup .dropdown-option {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(150,150,150,0.15);
        }
        .task-itemcode-lookup .dropdown-option:last-child { border-bottom: 0; }
        .task-itemcode-lookup .dropdown-option:hover { background: rgba(17,153,142,0.12); }
        .task-itemcode-lookup .lookup-option-code { font-weight: 700; color: var(--teal-primary); margin-right: 8px; }
        .task-itemcode-lookup .lookup-option-name { color: var(--text-primary); }
        .task-checklist { grid-column: 1 / -1; margin-top: 5px; border: 1px solid var(--card-border); border-radius: 10px; padding: 8px; }
        .task-checklist-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
        .checklist-row { display: grid; grid-template-columns: 22px 1fr; gap: 8px; align-items: center; margin-bottom: 5px; }
        .checklist-row .tasks-input { width: 100%; }
        .checklist-row input[type="checkbox"] { appearance: none; width: 16px; height: 16px; border-radius: 999px; border: 1px solid rgba(160,160,160,0.5); background: transparent; cursor: pointer; }
        .checklist-row input[type="checkbox"]:checked { background: rgba(42,184,173,0.95); border-color: rgba(42,184,173,1); }
        .task-modal-actions { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }

        @media (max-width: 980px) {
            .tasks-top-controls { grid-template-columns: 1fr 1fr; }
            .tasks-filter-panel { grid-template-columns: 1fr; }
            .tasks-shell { grid-template-columns: 1fr; }
            .tasks-splitter { display:none; }
            .task-form-grid, .task-optional-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="analytics-container tasks-container">
        <div class="analytics-header">
            <div class="header-content tasks-header">
                <span class="tasks-top-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9h18"></path><path d="M8 3v3"></path><path d="M16 3v3"></path><rect x="4" y="5" width="16" height="16" rx="2" ry="2"></rect>
                    </svg>
                </span>
                <div>
                    <div class="tasks-top-title">Task Timeline</div>
                                    </div>
            </div>
        </div>
        <div class="analytics-content tasks-content">
    <div class="tasks-page">
        <div class="tasks-top-card">
            <div class="tasks-top-controls">
                <input id="tasksSearch" class="tasks-input" placeholder="Search tasks" />
                <select id="tasksZoom" class="tasks-select">
                    <option value="day">Day View</option>
                    <option value="week" selected>Week View</option>
                    <option value="month">Month View</option>
                </select>
                <button id="tasksZoomInBtn" class="tasks-button" type="button">Zoom In</button>
                <button id="tasksZoomOutBtn" class="tasks-button" type="button">Zoom Out</button>
                <button id="tasksExpandAll" class="tasks-button" type="button">Expand/Collapse</button>
                <button id="tasksPanelToggle" class="tasks-button" type="button">Collapse Panel</button>
                <button id="tasksFilterToggle" class="tasks-button" type="button">Filters</button>
                <button id="tasksAddBtn" class="tasks-button primary" type="button">+ Add Task</button>
            </div>
            <div id="tasksFiltersPanel" class="tasks-filter-panel">
                <select id="tasksStatusFilter" class="tasks-select"></select>
                <select id="tasksAssigneeFilter" class="tasks-select"></select>
                <input id="tasksItemFilter" class="tasks-input" placeholder="Item code / name" />
                <input id="tasksLocationFilter" class="tasks-input" placeholder="Location / sublocation" />
                <button id="tasksClearFilters" class="tasks-button" type="button">Clear</button>
            </div>
        </div>

        <div id="tasksShell" class="tasks-shell">
            <div class="tasks-card">
                <div class="tasks-list-header"><span class="tasks-list-col"></span><span class="tasks-list-col name">Name <button id="tasksSortBtn" class="tasks-sort-btn" type="button" title="Sort: Manual">⇅</button><span id="tasksSortMode" class="tasks-sort-mode">Manual</span></span><span class="tasks-list-col assignee">Assignee</span></div>
                <div id="tasksListGap" class="tasks-list-gap" aria-hidden="true"></div>
                <div id="tasksListBody" class="tasks-list-body"></div>
            </div>
            <div id="tasksSplitter" class="tasks-splitter" aria-label="Resize task panel" role="separator"></div>
            <div class="tasks-card">
                <div id="tasksGanttWrap" class="gantt-wrap">
                    <button id="tasksPrevRange" class="timeline-nav-arrow left" type="button" aria-label="Previous period">‹</button>
                    <button id="tasksNextRange" class="timeline-nav-arrow right" type="button" aria-label="Next period">›</button>
                </div>
            </div>
        </div>
    </div>
        </div>
    </div>

    <div id="taskModal" class="task-modal">
        <div class="task-modal-card">
            <div id="taskModalTitle" class="task-modal-header">Task</div>
            <div class="task-modal-body">
                <div class="task-form-grid">
                    <input id="taskTitle" class="tasks-input" placeholder="Task title" />
                    <select id="taskParentId" class="tasks-select"></select>
                    <select id="taskStatus" class="tasks-select"></select>
                    <input id="taskAssignee" class="tasks-input" placeholder="Assignee" />
                    <input id="taskStartDate" type="date" class="tasks-input" />
                    <input id="taskDueDate" type="date" class="tasks-input" />
                    <textarea id="taskDescription" class="tasks-input" placeholder="Description (optional)"></textarea>
                    <div class="task-checklist">
                        <div class="task-checklist-title">Checklist</div>
                        <div id="taskChecklistRows"></div>
                        <button id="taskChecklistAdd" class="tasks-button" type="button">+ Add checklist item</button>
                    </div>
                    <details>
                        <summary>Optional fields</summary>
                        <div class="task-optional-grid">
                            <select id="taskPriority" class="tasks-select"></select>
                            <select id="taskColor" class="tasks-select"></select>
                            <input id="taskPercent" type="number" min="0" max="100" class="tasks-input" placeholder="Percent Complete" />
                            <div class="task-itemcode-lookup">
                                <input id="taskItemCode" class="tasks-input" placeholder="Item code or drug name" autocomplete="off" />
                                <div id="taskItemLookup" class="dropdown-options" role="listbox" aria-label="Item matches"></div>
                            </div>
                            <input id="taskItemName" class="tasks-input" placeholder="Item Name" />
                            <input id="taskLocation" class="tasks-input" placeholder="Location" />
                            <input id="taskSublocation" class="tasks-input" placeholder="Sublocation" />
                        </div>
                    </details>
                </div>
                <div class="task-modal-actions">
                    <button id="taskArchiveBtn" class="tasks-button" type="button">Archive</button>
                    <button id="taskCancelBtn" class="tasks-button" type="button">Cancel</button>
                    <button id="taskSaveBtn" class="tasks-button primary" type="button">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="items_details_mockdata.js"></script>
    <script src="js/app/taskManagerPage.js"></script>
</body>
</html>
