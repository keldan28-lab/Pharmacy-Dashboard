<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles/dashboard.css" />
    <link rel="stylesheet" href="styles/analytics.css" />
    <style>
        .tasks-page {
            height: 100%;
            box-sizing: border-box;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .tasks-header-card { padding: 12px; }
        .tasks-toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) auto auto auto auto;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .tasks-input,
        .tasks-select,
        .tasks-button {
            min-height: 38px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 13px;
            letter-spacing: 0.01em;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }
        .tasks-input,
        .tasks-select { padding: 8px 10px; }
        .tasks-input:focus,
        .tasks-select:focus {
            outline: none;
            border-color: rgba(17, 153, 142, 0.7);
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.18);
        }
        .tasks-button {
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .tasks-button:hover { background: rgba(255, 255, 255, 0.08); }
        .tasks-button.primary {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
            border: 0;
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.2);
        }
        .tasks-button.primary:hover { filter: brightness(1.05); }
        .tasks-filter-panel {
            margin-top: 8px;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            display: none;
            grid-template-columns: repeat(4, minmax(120px, 1fr)) auto;
            gap: 8px;
        }
        .tasks-filter-panel.open { display: grid; }

        .tasks-shell {
            flex: 1;
            min-height: 0;
            display: grid;
            gap: 12px;
            grid-template-columns: minmax(420px, 1.2fr) minmax(520px, 1.8fr);
        }
        .tasks-card {
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .tasks-card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
            margin: 2px 0 8px;
        }
        .tasks-list-header,
        .tasks-row {
            display: grid;
            grid-template-columns: 30px 1fr 90px 90px 70px 96px 112px;
            gap: 6px;
            align-items: center;
        }
        .tasks-list-header {
            padding: 6px 4px;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tasks-list-body { min-height: 0; overflow: auto; }
        .tasks-row {
            font-size: 13px;
            padding: 7px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.14s ease;
        }
        .tasks-row:hover { background: rgba(255,255,255,0.04); }
        .tree-toggle {
            width: 22px;
            height: 22px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .tree-toggle:hover { background: rgba(255,255,255,0.08); }
        .task-title-wrap {
            display: flex;
            align-items: center;
            min-width: 0;
        }
        .task-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 1px solid var(--card-border);
            padding: 2px 8px;
            font-size: 11px;
            line-height: 1.2;
        }
        .status-open { background: rgba(17, 153, 142, 0.16); color: #7af4cd; }
        .status-blocked { background: rgba(255, 84, 84, 0.16); color: #ffc0c0; }
        .status-done { background: rgba(92, 184, 92, 0.18); color: #b0f5b0; }

        .gantt-wrap { min-height: 0; overflow: auto; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .gantt-head, .gantt-row { display: grid; min-width: 860px; }
        .gantt-head {
            position: sticky;
            top: 0;
            z-index: 2;
            background: rgba(20, 24, 34, 0.88);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid var(--card-border);
        }
        .gantt-cell {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            padding: 5px 2px;
            border-right: 1px solid rgba(255,255,255,0.06);
        }
        .gantt-row {
            position: relative;
            min-height: 33px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .gantt-bar {
            position: absolute;
            top: 7px;
            height: 20px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease;
        }
        .gantt-bar:hover { transform: translateY(-1px); filter: brightness(1.06); }
        .priority-high { box-shadow: inset 0 0 0 1px rgba(255, 84, 84, 0.7); }

        .tasks-empty {
            color: var(--text-secondary);
            padding: 28px 16px;
            text-align: center;
            font-size: 13px;
        }

        .task-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.56);
            backdrop-filter: blur(2px);
            z-index: 80;
        }
        .task-modal.open { display: flex; }
        .task-modal-card {
            width: min(640px, 92vw);
            max-height: 88vh;
            overflow: auto;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
            padding: 14px;
        }
        .task-form-grid {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(2, minmax(160px, 1fr));
            gap: 8px;
        }
        .task-form-grid textarea { grid-column: 1 / -1; min-height: 72px; resize: vertical; }
        .task-form-grid details { grid-column: 1 / -1; border: 1px solid var(--card-border); border-radius: 10px; padding: 8px; }
        .task-form-grid summary { cursor: pointer; font-size: 12px; color: var(--text-secondary); font-weight: 600; }
        .task-optional-grid { margin-top: 8px; display: grid; grid-template-columns: repeat(2, minmax(160px, 1fr)); gap: 8px; }
        .task-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
        }

        @media (max-width: 1220px) {
            .tasks-shell { grid-template-columns: 1fr; }
        }
        @media (max-width: 880px) {
            .tasks-toolbar { grid-template-columns: 1fr 1fr; }
            .tasks-filter-panel { grid-template-columns: 1fr; }
            .task-form-grid, .task-optional-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="tasks-page">
        <div class="analytics-card tasks-header-card">
            <div class="card-header">
                <div class="card-title-group">
                    <div>
                        <div class="card-title">Tasks</div>
                        <div class="card-subtitle">Hierarchical planning in a minimal timeline workspace</div>
                    </div>
                </div>
            </div>

            <div class="tasks-toolbar">
                <input id="tasksSearch" class="tasks-input" placeholder="Search tasks" />
                <select id="tasksZoom" class="tasks-select">
                    <option value="week">Week View</option>
                    <option value="month">Month View</option>
                </select>
                <button id="tasksExpandAll" class="tasks-button">Expand/Collapse</button>
                <button id="tasksFilterToggle" class="tasks-button">Filters</button>
                <button id="tasksAddBtn" class="tasks-button primary">+ Add Task</button>
            </div>

            <div id="tasksFiltersPanel" class="tasks-filter-panel">
                <select id="tasksStatusFilter" class="tasks-select"></select>
                <select id="tasksAssigneeFilter" class="tasks-select"></select>
                <input id="tasksItemFilter" class="tasks-input" placeholder="Item code / name" />
                <input id="tasksLocationFilter" class="tasks-input" placeholder="Location / sublocation" />
                <button id="tasksClearFilters" class="tasks-button" type="button">Clear</button>
            </div>
        </div>

        <div class="tasks-shell">
            <div class="tasks-card">
                <div class="tasks-card-title">Hierarchy</div>
                <div class="tasks-list-header">
                    <div></div><div>Task</div><div>Status</div><div>Priority</div><div>%</div><div>Owner</div><div>Linked</div>
                </div>
                <div id="tasksListBody" class="tasks-list-body"></div>
            </div>

            <div class="tasks-card">
                <div class="tasks-card-title">Timeline</div>
                <div id="tasksGanttWrap" class="gantt-wrap"></div>
            </div>
        </div>
    </div>

    <div id="taskModal" class="task-modal">
        <div class="task-modal-card">
            <h3 id="taskModalTitle" style="margin:0;">Task</h3>
            <div class="task-form-grid">
                <input id="taskTitle" class="tasks-input" placeholder="Title" />
                <select id="taskParentId" class="tasks-select"></select>
                <select id="taskStatus" class="tasks-select"></select>
                <input id="taskAssignee" class="tasks-input" placeholder="Assignee" />
                <input id="taskStartDate" type="date" class="tasks-input" />
                <input id="taskDueDate" type="date" class="tasks-input" />
                <textarea id="taskDescription" class="tasks-input" placeholder="Description (optional)"></textarea>
                <details>
                    <summary>Optional fields</summary>
                    <div class="task-optional-grid">
                        <select id="taskPriority" class="tasks-select"></select>
                        <input id="taskPercent" type="number" min="0" max="100" class="tasks-input" placeholder="Percent Complete" />
                        <input id="taskItemCode" class="tasks-input" placeholder="Item Code" />
                        <input id="taskItemName" class="tasks-input" placeholder="Item Name" />
                        <input id="taskLocation" class="tasks-input" placeholder="Location" />
                        <input id="taskSublocation" class="tasks-input" placeholder="Sublocation" />
                    </div>
                </details>
            </div>
            <div class="task-modal-actions">
                <button id="taskArchiveBtn" class="tasks-button" type="button">Archive</button>
                <button id="taskCancelBtn" class="tasks-button" type="button">Cancel</button>
                <button id="taskSaveBtn" class="tasks-button primary" type="button">Save</button>
            </div>
        </div>
    </div>

    <script src="js/app/taskManagerPage.js"></script>
</body>
</html>
